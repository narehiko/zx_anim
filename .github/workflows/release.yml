name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest discover -s tests
      - run: pyinstaller --clean --noconfirm zx_anim.spec
      - run: choco install innosetup --no-progress -y
      - shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          iscc "/DAppVersion=$version" installer/zx_anim.iss
          Compress-Archive `
            -Path "dist/ZX Anim/*" `
            -DestinationPath "installer/output/ZX-Anim-$version-Portable.zip"
      - shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" installer/output/* --generate-notes
